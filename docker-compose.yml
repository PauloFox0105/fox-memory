services:
  fox-memory:
    build: .
    container_name: fox-memory
    restart: unless-stopped
    ports:
      - "18820:18810"
    volumes:
      - ./memory.db:/app/memory.db
    env_file:
      - .env

  fox-memory-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: fox-memory-mcp
    restart: unless-stopped
    ports:
      - "18821:18821"
    env_file:
      - .env
    depends_on:
      - fox-memory
